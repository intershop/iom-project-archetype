# trigger build for every branch
trigger:
  batch: true
  #- feature/65868-iom-bootstrap-project

variables:
  M2_LOCAL_REPO: $(Pipeline.Workspace)/local-maven-repo
  MAVEN_OPTS: '-Dmaven.repo.local=$(M2_LOCAL_REPO)'
  # mitigation for https://issues.sonatype.org/browse/NEXUS-27902
  JDK_JAVA_OPTIONS: '--add-opens java.base/java.util=ALL-UNNAMED'
  # IOM Helm Chart
  IOM_HELM_VERSION: 3.1.1
  IOM_HELM_URL: https://intershop.github.io/helm-charts
  HELM_RELEASE_NAME: archetype-test-$(Build.BuildId)

  # ACR
  IOM_DEVOPS_ACR_HOST: iomdevopsacr.azurecr.io
  IOM_DEVOPS_ACR_CONNECTION: order-iomDevopsACR-ISH-ENG-IOM

  # IOM Docker Hub
  # contains all release images, that are made public for our customers.
  IOM_DOCKERHUB_HOST: docker.tools.intershop.com/iom/intershophub
  IOM_DOCKERHUB_CONNECTION: order-iom-docker.tools.intershop.com

  # AKS
  AZURE_TENANT_ID: 13a9f4be-a9d5-4987-bdf2-f31cc074034f
  AKS_SUBSCRIPTION_ID: 19e427d6-b6b0-4dee-acf3-5d062107a010
  AKS_NAME: iom-ci-aks-autoscaled
  AKS_RESOURCE_GROUP: iom-ci
  KUBELOGIN_DOWNLOAD_URL: https://github.com/Azure/kubelogin/releases/download/v0.0.32/kubelogin-linux-amd64.zip
  # Pull secret has to exist in default namespace.
  # It has to be created manually in advance.
  PULL_SECRET: iomdevops-pull-secret
  IOM_AKS_NAMESPACE: $(HELM_RELEASE_NAME)

  # JDK to be used by Maven + Project build
  JDK_MAJOR_VERSION: 21

  # directory name with archetype sources
  ARCHETYPE_PATH: order-iom-project-archetype

  # wrap environment variables for build_image.sh
  PROJECT_IMAGE_TAG_FILE: $(Pipeline.Workspace)/image-tag.txt
  PROJECT_IMAGE_NAME_FILE: $(Pipeline.Workspace)/image-name.txt
  # these will be set by a later job step
  PROJECT_IMAGE_TAG:
  PROJECT_IMAGE_NAME:
  IMAGE_DOCKER_OPTS: >-
    --get-image-name=$(PROJECT_IMAGE_NAME_FILE)
    --get-image-tag=$(PROJECT_IMAGE_TAG_FILE)

jobs:
- job:
  variables:
    - group: azure-devops-build-machines # BUILD_AGENT_POOL_2_CORES
  pool: $(BUILD_AGENT_POOL_2_CORES)
  continueOnError: false
  workspace:
    clean: all

  steps:

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '$(JDK_MAJOR_VERSION)'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    timeoutInMinutes: 1
    displayName: Install JDK $(JDK_MAJOR_VERSION)

  - task: HelmInstaller@1
    displayName: "Prepare - install Helm"

  - checkout: self
    clean: true
    path: $(ARCHETYPE_PATH)
    displayName: "Checkout - $(ARCHETYPE_PATH)@$(Build.SourceBranchName)"
    timeoutInMinutes: "5"
    persistCredentials: true

  - task: Cache@2
    inputs:
      # according to https://docs.microsoft.com/en-us/azure/devops/pipelines/process/variables?view=azure-devops&tabs=yaml%2Cbatch
      # this variable expansion should not work, but it's the only way I got to work.
      key: '"mvn_ipa" | $(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/pom.xml | $(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/src/test/resources/projects/basic/archetype.properties'
      restoreKeys: |
        mvn_ipa
      path: "$(M2_LOCAL_REPO)"
      cacheHitVar: M2_REPO_CACHE_HIT
    timeoutInMinutes: 5
    displayName: "Cache - create/restore local maven cache at $(M2_LOCAL_REPO)"

  - task: MavenAuthenticate@0
    inputs:
      artifactsFeeds: order-iom-snapshots,order-iom-releases
    timeoutInMinutes: 1
    displayName: "Maven - authenticate"

  - task: Docker@2
    inputs:
      command: login
      containerRegistry: $(IOM_DEVOPS_ACR_CONNECTION)
    timeoutInMinutes: 1
    displayName: "Docker - login to DevOps ACR"

  - task: Docker@2
    inputs:
      command: login
      containerRegistry: $(IOM_DOCKERHUB_CONNECTION)
    timeoutInMinutes: 1
    displayName: "Docker - login to Dockerhub"

  - script: |
      set -e

      curl -LO "$KUBELOGIN_DOWNLOAD_URL"
      unzip $(basename "$KUBELOGIN_DOWNLOAD_URL")
      echo "##vso[task.setvariable variable=PATH;]$PATH:$(pwd)/$(dirname $(find . -name kubelogin))"
    timeoutInMinutes: 3
    displayName: "Install kubelogin"

  - script: |
      set -e

      rm -fr $HOME/.kube
      az login --service-principal -u $AZURE_SP_CLIENT_ID -p $AZURE_SP_CLIENT_SECRET -t $AZURE_TENANT_ID
      az aks get-credentials -g "$AKS_RESOURCE_GROUP" -n "$AKS_NAME" --subscription "$AKS_SUBSCRIPTION_ID"
      kubelogin convert-kubeconfig -l spn

      echo "##vso[task.setvariable variable=AAD_SERVICE_PRINCIPAL_CLIENT_ID;]$AZURE_SP_CLIENT_ID"
      echo "##vso[task.setvariable variable=AAD_SERVICE_PRINCIPAL_CLIENT_SECRET;]$AZURE_SP_CLIENT_SECRET"
    env:
      AZURE_SP_CLIENT_ID: $(AZURE_SP_CLIENT_ID)
      AZURE_SP_CLIENT_SECRET: $(AZURE_SP_CLIENT_SECRET)
    timeoutInMinutes: 3
    displayName: "Login to AKS"

  - script: |
      set -e
      kubectl create namespace "$IOM_AKS_NAMESPACE"
      # iomdevops-pull-secret is maintained centrally in the default namespace and
      # covers all required registries (DevOps ACR + Docker Hub). Copy it into the
      # CI namespace so the Helm chart can use it as an imagePullSecret.
      kubectl get secret iomdevops-pull-secret --namespace=default -o yaml \
        | sed "s/namespace: default/namespace: $IOM_AKS_NAMESPACE/" \
        | kubectl apply --namespace="$IOM_AKS_NAMESPACE" -f -
    timeoutInMinutes: 1
    displayName: "Kubernetes - Create Namespace and Pull Secret"

  # Build and integration-test the archetype. The archetype integration test
  # generates a test project and builds its Docker image, which is consumed by
  # the AKS smoke test further below.
  - task: Maven@3
    inputs:
      goals: clean verify
      mavenPomFile: '$(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/pom.xml'
      mavenOptions: '-Xmx1024m $(MAVEN_OPTS)'
    displayName: "Maven - build and verify archetype"

  - task: Maven@3
    inputs:
      goals: clean verify
      mavenPomFile: '$(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/target/test-classes/projects/basic/project/archetype-test/dependency-helper/pom.xml'
      mavenOptions: '-Xmx1024m $(MAVEN_OPTS)'
    displayName: "Maven - run verify goal against dependency-helper"

  - script: |
      # stop on any error
      set -e

      docker tag "$(cat $PROJECT_IMAGE_NAME_FILE):$(cat $PROJECT_IMAGE_TAG_FILE)" \
      "$IOM_DEVOPS_ACR_HOST/ci/$(cat $PROJECT_IMAGE_NAME_FILE):$(cat $PROJECT_IMAGE_TAG_FILE)-${BUILD_BUILDID}"
      docker push "$IOM_DEVOPS_ACR_HOST/ci/$(cat $PROJECT_IMAGE_NAME_FILE):$(cat $PROJECT_IMAGE_TAG_FILE)-${BUILD_BUILDID}"
      # set variables
      echo "##vso[task.setvariable variable=PROJECT_IMAGE_TAG;]$(cat $PROJECT_IMAGE_TAG_FILE)-${BUILD_BUILDID}"
      echo "##vso[task.setvariable variable=PROJECT_IMAGE_NAME;]$IOM_DEVOPS_ACR_HOST/ci/$(cat $PROJECT_IMAGE_NAME_FILE)"

    timeoutInMinutes: "10"
    displayName: "Docker - tag images and push to ACR"

  - script: |
      set -e

      helm repo add intershop $IOM_HELM_URL
      helm repo update
    timeoutInMinutes: 1
    displayName: download IOM Helm Charts

  - script: |
      set -e

      helm install $(HELM_RELEASE_NAME) intershop/iom \
        --version $(IOM_HELM_VERSION) \
        --namespace $(IOM_AKS_NAMESPACE) \
        --values $(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/helm-values-test.yaml \
        --set image.repository=$(PROJECT_IMAGE_NAME) \
        --set image.tag=$(PROJECT_IMAGE_TAG) \
        --set ingress.hosts[0].host=ipb.$(Build.BuildId).ci \
        --timeout 900s \
        --wait
    timeoutInMinutes: 20
    displayName: "Helm - install archetype-test release"

  # Publish the archetype to the Azure DevOps Artifacts feed only after the
  # build, archetype integration test and AKS smoke test have all succeeded.
  # Maven routes the artifact automatically based on the project version:
  #   *-SNAPSHOT -> order-iom-snapshots (distributionManagement/snapshotRepository)
  #   release    -> order-iom-releases  (distributionManagement/repository)
  # archetype.test.skip avoids re-running the integration test that already ran
  # during the "clean verify" build above.
  - task: Maven@3
    condition: succeeded()
    inputs:
      goals: deploy
      options: '-Darchetype.test.skip=true'
      mavenPomFile: '$(Agent.BuildDirectory)/$(ARCHETYPE_PATH)/pom.xml'
      mavenOptions: '-Xmx1024m $(MAVEN_OPTS)'
    displayName: "Maven - deploy archetype to order-iom feed"

  - script: |
      echo "##[section] describe all pods"
      kubectl get pods -n "$IOM_AKS_NAMESPACE"
      for POD in $(kubectl get pods -n "$IOM_AKS_NAMESPACE" -o jsonpath='{.items[*].metadata.name}'); do
        echo "##[section] kubectl describe pod/$POD"
        kubectl describe pod "$POD" -n "$IOM_AKS_NAMESPACE" || true
        echo "##[section] kubectl logs pod/$POD"
        kubectl logs "$POD" -n "$IOM_AKS_NAMESPACE" --all-containers --previous=false || true
      done
    condition: failed()
    timeoutInMinutes: 5
    displayName: "Diagnostics - describe and log pods on failure"

  # CLEANUP TASKS
  - script: |
      helm uninstall $(HELM_RELEASE_NAME) \
        --namespace $(IOM_AKS_NAMESPACE) \
        --timeout 300s || true
    condition: always()
    timeoutInMinutes: 10
    displayName: "Cleanup - uninstall archetype-test release"

    # Should show, that the cluster is deleted
  - script: |
      kubectl get all -n $IOM_AKS_NAMESPACE
    condition: always()
    displayName: Show status of cluster

  - script: |
      echo "##[debug] cleanup IOM and namespace $IOM_AKS_NAMESPACE"
      # wait for pv to disappear before deleting the namespace, otherwise the pv cannot be deleted
      PV=$(kubectl get pv | grep " $IOM_AKS_NAMESPACE/" | { read ID REST; echo $ID; })
      if [ ! -z "$PV" ]; then
        while kubectl get pv | grep -q "$PV"; do
          sleep 10
        done
      fi
      kubectl delete namespace "$IOM_AKS_NAMESPACE" || true
    timeoutInMinutes: 5
    displayName: "Cleanup - wait for PV deletion, delete namespace"
    condition: always()
